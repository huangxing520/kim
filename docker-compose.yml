networks:
  kimnet:
    driver: bridge

x-controller-common: &controller_common
  image: docker.io/apache/kafka:latest
  restart: always
  networks:
    - kimnet
  environment:
    KAFKA_PROCESS_ROLES: controller
    KAFKA_LISTENERS: CONTROLLER://:9093
    KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
    KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk  # 保持不变（可自行修改）
    KAFKA_LOG_DIRS: /opt/kafka/data            # 指定数据目录到挂载路径，否则默认 /tmp/kafka-logs 不持久化

x-broker-common: &broker_common
  image: docker.io/apache/kafka:latest
  restart: always
  networks:
    - kimnet
  environment:
    KAFKA_PROCESS_ROLES: broker
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
    KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    KAFKA_LISTENERS: 'PLAINTEXT://:19092,PLAINTEXT_HOST://:9092'
    KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
    KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    KAFKA_LOG_DIRS: /opt/kafka/data            # 指定数据目录到挂载路径，否则默认 /tmp/kafka-logs 不持久化
    # 自动创建 topic 时的默认参数
    KAFKA_NUM_PARTITIONS: 3                    # 默认分区数
    KAFKA_DEFAULT_REPLICATION_FACTOR: 3        # 默认副本数（=broker 数）
    KAFKA_MIN_INSYNC_REPLICAS: 2               # 最少同步副本数（配合 acks=all 使用）
    KAFKA_LOG_RETENTION_BYTES: 10737418240     # 每个分区最大日志大小 10GB
    KAFKA_LOG_RETENTION_HOURS: 168          # 7天
services:
  # ========== Controller 节点（仅元数据） ==========
  controller-1:
    <<: *controller_common
    container_name: kim_controller_1
    mem_limit: 1g
    volumes:
      - ~/data/controller-1:/opt/kafka/data
    env_file: ./kafka/controller-1.env

  controller-2:
    <<: *controller_common
    container_name: kim_controller_2
    mem_limit: 1g
    volumes:
      - ~/data/controller-2:/opt/kafka/data
    env_file: ./kafka/controller-2.env

  controller-3:
    <<: *controller_common
    container_name: kim_controller_3
    mem_limit: 1g
    volumes:
      - ~/data/controller-3:/opt/kafka/data
    env_file: ./kafka/controller-3.env

  # ========== Broker 节点（数据服务） ==========
  broker-1:
    <<: *broker_common
    container_name: kim_broker_1
    mem_limit: 4g
    ports:
      - "29092:9092"    # 对外访问端口 (host:29092→container:9092)
    volumes:
      - ~/data/broker-1:/opt/kafka/data
    env_file: ./kafka/broker-1.env

  broker-2:
    <<: *broker_common
    container_name: kim_broker_2
    mem_limit: 4g
    ports:
      - "29192:9092"
    volumes:
      - ~/data/broker-2:/opt/kafka/data
    env_file: ./kafka/broker-2.env

  broker-3:
    <<: *broker_common
    container_name: kim_broker_3
    mem_limit: 4g
    ports:
      - "29292:9092"
    volumes:
      - ~/data/broker-3:/opt/kafka/data
    env_file: ./kafka/broker-3.env
  mariadb:
    image: docker.io/library/mariadb:11.8.8
    container_name: kim_mariadb
    restart: always
    networks: 
      - kimnet
    ports:
      - "13306:3306"
    volumes:
      - ~/data/mariadb:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    environment:
      TZ: Asia/Shanghai
      MARIADB_ROOT_PASSWORD: 123456
      MARIADB_USER: kim_user
      MARIADB_PASSWORD: user123
    # 限制内存，防止占满服务器
    mem_limit: 1g
    # 统一字符集，解决中文乱码
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+8:00
  redis:
    image: docker.io/library/redis:7.2
    container_name: kim_redis
    command: redis-server
    networks: 
      - kimnet
    ports:
      - "16378:6379"
    volumes:
      - ~/data/redis:/data
  consul:
    image: docker.io/library/consul:1.15.4
    container_name: kim_consul
    networks: 
      - kimnet
    ports:
      - '8300:8300'
      - '8301:8301'
      - '8301:8301/udp'
      - '8500:8500'
      - '853:53'
      - '853:53/udp'
    command: agent -dev -dns-port=53 -recursor=8.8.8.8 -ui -client=0.0.0.0
    environment:
      CONSUL_BIND_INTERFACE: eth0
      CONSUL_ALLOW_PRIVILEGED_PORTS: 53
  kafdrop:
    image: docker.io/obsidiandynamics/kafdrop:latest
    container_name: kim_kafdrop
    restart: always
    networks:
      - kimnet
    ports:
      - "19000:9000"   # Kafdrop UI 端口 (host:19000→container:9000)
    environment:
      KAFKA_BROKERCONNECT: broker-1:19092,broker-2:19092,broker-3:19092
      JVM_OPTS: "-Xms64M -Xmx256M"
      SERVER_SERVLET_CONTEXTPATH: "/"
    depends_on:
      - broker-1
      - broker-2
      - broker-3
 
