service_id: "gate01"
service_name: "wgateway"
listen: ":8000"
grpc_listen: ":9001"
grpc_port: 9001
public_address: "127.0.0.1"
public_port: 8000
tags:
  - "IDC:SH_ALI"
domain: "ws://kingimcloud.com"
consul_url: "http://127.0.0.1:8500"
monitor_port: 8001
app_secret: ""
log_level: "info"
message_g_pool: 5000
connection_g_pool: 15000
protocol: "ws"
kafka:
  enable: false
  brokers: []
  topic: "kim_logs"
# 弹性套件配置（不配置则使用代码默认值）
resilience:
  breaker:
    enable: true
    strategy: "both"          # error_rate | slow_call | both
    threshold: 0.5            # 错误率阈值
    slow_call_rtt: "500ms"    # 慢调用阈值
    slow_call_ratio: 0.5      # 慢调用比例阈值
    retry_timeout_ms: 5000    # 熔断打开后多久尝试半开
    min_request_amount: 10    # 触发熔断的最小请求数
    stat_interval_ms: 1000    # 统计窗口
  retry:
    enable: true
    max_attempts: 3
    initial_backoff: "50ms"
    max_backoff: "500ms"
    multiplier: 2.0
    jitter: 0.1
  timeout:
    enable: true
    default: "3s"
  limiter:
    enable: true
    client_qps: 100           # 客户端（出向）限流
    server_qps: 200           # 服务端（入向）限流
# 链路追踪配置（默认关闭，配置 enable: true 启用）
trace:
  enable: false
  exporter: "otlp"            # otlp | stdout | noop
  endpoint: "127.0.0.1:4317"  # OTLP gRPC collector 地址
  sampling_ratio: 0.1         # 采样率 0.0~1.0
  insecure: true              # 是否用 plaintext（无 TLS）
