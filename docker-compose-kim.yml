services:
  gateway:
    build: .
    container_name: kim-gateway
    restart: unless-stopped
    networks:
      - kimnet
    ports:
      - "8000:8000"
      - "9001:9001"
      - "8001:8001"
    command: ["kim", "gateway", "-c", "/etc/kim/conf.yaml", "-r", "/etc/kim/route.json"]
    volumes:
      - ./services/gateway/conf.yaml:/etc/kim/conf.yaml:ro
      - ./services/gateway/route.json:/etc/kim/route.json:ro
      - ./data/gateway:/data
    environment:
      KIM_CONSUL_URL: http://consul:8500
      KIM_PUBLIC_ADDRESS: gateway
      KIM_LOG_LEVEL: info
    depends_on:
      - comet
      - logic

  comet:
    build: .
    container_name: kim-comet
    restart: unless-stopped
    networks:
      - kimnet
    ports:
      - "8005:8005"
      - "8007:8007"
    command: ["kim", "comet", "-c", "/etc/kim/conf.yaml"]
    volumes:
      - ./services/comet/conf.yaml:/etc/kim/conf.yaml:ro
      - ./data/comet:/data
    environment:
      KIM_CONSUL_URL: http://consul:8500
      KIM_PUBLIC_ADDRESS: comet
      KIM_REDIS_ADDRS: redis:6379
      KIM_LOG_LEVEL: info
    depends_on:
      - logic

  logic:
    build: .
    container_name: kim-logic
    restart: unless-stopped
    networks:
      - kimnet
    ports:
      - "9002:9002"
      - "8009:8009"
    command: ["kim", "logic", "-c", "/etc/kim/conf.yaml"]
    volumes:
      - ./services/logic/conf.yaml:/etc/kim/conf.yaml:ro
      - ./data/logic:/data
    environment:
      KIM_CONSUL_URL: http://consul:8500
      KIM_PUBLIC_ADDRESS: logic
      KIM_REDIS_ADDRS: redis:6379
      KIM_BASE_DB: root:123456@tcp(mariadb:3306)/kim?parseTime=true
      KIM_MESSAGE_DB: root:123456@tcp(mariadb:3306)/kim_message?parseTime=true
      KIM_LOG_LEVEL: info

  router:
    build: .
    container_name: kim-router
    restart: unless-stopped
    networks:
      - kimnet
    ports:
      - "8100:8100"
      - "8011:8011"
    command: ["kim", "router", "-c", "/etc/kim/conf.yaml", "-d", "/etc/kim/data"]
    volumes:
      - ./services/router/conf.yaml:/etc/kim/conf.yaml:ro
      - ./services/router/data:/etc/kim/data:ro
      - ./data/router:/data
    environment:
      KIM_CONSUL_URL: http://consul:8500
      KIM_PUBLIC_ADDRESS: router
      KIM_LOG_LEVEL: info

networks:
  kimnet:
    external: true
